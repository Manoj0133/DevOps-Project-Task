name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      AWS_ROLE_ARN: arn:aws:iam::381492115031:role/statuspulse-github-actions
      INSTANCE_NAME: statuspulse
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/statuspulse
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
      PUBLIC_BASE_URL: https://ak-info.online

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find EC2 instance
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${INSTANCE_NAME}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "EC2 instance not found"
            exit 1
          fi

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Deploy via SSM
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "$INSTANCE_ID" \
            --comment "Deploy StatusPulse" \
            --parameters commands="[
              \"set -e\",
              \"cd /opt/statuspulse || exit 1\",
              \"docker pull $IMAGE_NAME:$IMAGE_TAG\",
              \"docker stop statuspulse || true\",
              \"docker rm statuspulse || true\",
              \"docker run -d --name statuspulse -p 80:3000 $IMAGE_NAME:$IMAGE_TAG\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV

      - name: Wait for deployment
        run: |
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)

            echo "Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" ]]; then
              echo "Deployment failed"
              exit 1
            fi

            sleep 10
          done

          echo "Timeout waiting for deployment"
          exit 1

      - name: Health check
        run: |
          curl -f ${PUBLIC_BASE_URL}/health || exit 1
