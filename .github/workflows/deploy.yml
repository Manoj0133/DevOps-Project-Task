name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: "381492115031"
      AWS_ROLE_NAME: statuspulse-github-actions
      AWS_ROLE_ARN: arn:aws:iam::381492115031:role/statuspulse-github-actions
      INSTANCE_NAME: statuspulse
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/statuspulse
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      HEAD_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      PUBLIC_BASE_URL: https://ak-info.online
      DEPLOY_NOTIFY_WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
    steps:
      - name: Checkout commit that passed CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find EC2 instance
        id: instance
        run: |
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=${INSTANCE_NAME}" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Unable to find a running instance named ${INSTANCE_NAME}" >&2
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Send deploy command
        id: ssm
        run: |
          COMMAND_PAYLOAD="$(python3 - <<'PY'
import json
import os

cmds = [
    "set -euo pipefail",
    "cd /opt/statuspulse",
    "git config --global --add safe.directory /opt/statuspulse || true",
    f"git fetch --all --prune",
    f"git checkout {os.environ['HEAD_SHA']}",
    (
        f"IMAGE_NAME={os.environ['IMAGE_NAME']} "
        f"IMAGE_TAG={os.environ['IMAGE_TAG']} "
        f"PUBLIC_BASE_URL={os.environ['PUBLIC_BASE_URL']} "
        f"DEPLOY_NOTIFY_WEBHOOK_URL={os.environ.get('DEPLOY_NOTIFY_WEBHOOK_URL', '')} "
        "./scripts/deploy.sh"
    ),
]
print(json.dumps({"commands": cmds}))
PY
)"
          COMMAND_ID="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --comment "StatusPulse deploy ${HEAD_SHA}" \
            --instance-ids "${{ steps.instance.outputs.instance_id }}" \
            --parameters "$COMMAND_PAYLOAD" \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy command
        run: |
          for i in $(seq 1 36); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ steps.instance.outputs.instance_id }}" \
              --query 'Status' \
              --output text 2>/dev/null || true)"
            case "$STATUS" in
              Success)
                echo "SSM command completed successfully"
                exit 0
                ;;
              Failed|Cancelled|TimedOut)
                echo "SSM command ended with status: $STATUS" >&2
                aws ssm get-command-invocation \
                  --command-id "${{ steps.ssm.outputs.command_id }}" \
                  --instance-id "${{ steps.instance.outputs.instance_id }}" \
                  --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                  --output json || true
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command" >&2
          exit 1

      - name: Verify deployed health
        if: success()
        run: |
          curl -fsS "${PUBLIC_BASE_URL}/health" | python3 -c 'import json,sys; data=json.load(sys.stdin); checks=data.get("checks", {}); raise SystemExit(0 if data.get("status") == "healthy" and all(checks.get(k) == "healthy" for k in ("api","database","redis")) else 1)'

      - name: Notify success
        if: success() && env.DEPLOY_NOTIFY_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST \
            -H 'Content-Type: application/json' \
            --data "{\"text\":\"StatusPulse deploy succeeded for ${IMAGE_TAG}\"}" \
            "$DEPLOY_NOTIFY_WEBHOOK_URL"

      - name: Notify failure
        if: failure() && env.DEPLOY_NOTIFY_WEBHOOK_URL != ''
        run: |
          curl -fsS -X POST \
            -H 'Content-Type: application/json' \
            --data "{\"text\":\"StatusPulse deploy failed for ${IMAGE_TAG}\"}" \
            "$DEPLOY_NOTIFY_WEBHOOK_URL"
