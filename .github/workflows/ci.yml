name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      APP_PORT: "8000"
      RESULTS_FILE: tests/results/integration-results.txt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Lint Python with ruff
        run: ruff check app tests

      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Scan Dockerfile with hadolint
        run: docker run --rm -i hadolint/hadolint:latest-debian < Dockerfile

      - name: Build Docker image
        run: docker build -t statuspulse-app:${{ github.sha }} -f Dockerfile .

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: statuspulse-app:${{ github.sha }}
          scan-type: image
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Start full stack
        run: docker compose up -d --build app db redis

      - name: Wait for healthy API
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health | python3 -c 'import json,sys; data=json.load(sys.stdin); checks=data.get("checks", {}); raise SystemExit(0 if data.get("status") == "healthy" and all(checks.get(k) == "healthy" for k in ("api","database","redis")) else 1)'; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time" >&2
          exit 1

      - name: Run integration tests
        run: bash tests/test_integration.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: tests/results/

      - name: Tear down stack
        if: always()
        run: docker compose down -v
